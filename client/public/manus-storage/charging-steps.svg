<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title">
  <title id="title">Three charging steps</title>
  <rect width="1200" height="520" rx="28" fill="#0b1218"/>
  <g fill="none" stroke="#39d353" stroke-width="3" opacity=".18">
    <path d="M80 380h1040M180 80v360M600 80v360M1020 80v360"/>
  </g>
  <g font-family="Space Grotesk, Inter, Arial, sans-serif" text-anchor="middle">
    <g transform="translate(210 90)">
      <circle cx="0" cy="0" r="48" fill="#12351e" stroke="#39d353" stroke-width="4"/>
      <text y="14" fill="#39d353" font-size="42" font-weight="800">1</text>
      <path d="M-54 106h108v150H-54z" rx="18" fill="#16222e"/>
      <path d="M-28 130h56v32h-56zM-22 185h44v44h-44z" fill="#39d353" opacity=".9"/>
      <text x="0" y="330" fill="#f8fafc" font-size="34" font-weight="800">Find</text>
      <text x="0" y="368" fill="#9ca3af" font-size="20">Locate nearby charger</text>
    </g>
    <g transform="translate(600 90)">
      <circle cx="0" cy="0" r="48" fill="#12351e" stroke="#39d353" stroke-width="4"/>
      <text y="14" fill="#39d353" font-size="42" font-weight="800">2</text>
      <rect x="-70" y="110" width="140" height="210" rx="24" fill="#16222e"/>
      <path d="M-38 148h76M-38 184h76M-38 220h48" stroke="#39d353" stroke-width="14" stroke-linecap="round"/>
      <text x="0" y="330" fill="#f8fafc" font-size="34" font-weight="800">Reserve</text>
      <text x="0" y="368" fill="#9ca3af" font-size="20">Book your slot</text>
    </g>
    <g transform="translate(990 90)">
      <circle cx="0" cy="0" r="48" fill="#12351e" stroke="#39d353" stroke-width="4"/>
      <text y="14" fill="#39d353" font-size="42" font-weight="800">3</text>
      <path d="M-86 258c22-75 76-118 160-130l132 15c70 14 113 52 130 113l-38 15H-48Z" fill="#16222e"/>
      <path d="M-25 175h170l42 48H-70Z" fill="#39d353" opacity=".28"/>
